---
name: 'Automated Version Bump'

on:
  pull_request:
    types: [closed]

jobs:
  bump:
    if: ${{ github.event.pull_request.merged && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'renovate[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - name: Bump version
        uses: phips28/gh-action-bump-version@v11.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version-type: patch
          target-branch: ${{ github.event.repository.default_branch }}
          tag-prefix: 'v'
      - name: Trigger publish workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish.yaml',
              ref: context.payload.repository.default_branch,
            })
